name: blue-green deployment

on:
  push:
    branches:
      - main

jobs:
  build-and-deploy:
    runs-on: self-hosted
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Install dependencies
        run: npm install

      - name: Run tests
        run: npm test

      - name: Run Trivy filesystem scan
        uses: aquasecurity/trivy-action@0.28.0
        with:
          scan-type: 'filesystem'
          scan-ref: '.'

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build Docker image (tag with SHA)
        run: |
          docker build -t ${{ secrets.DOCKER_USERNAME }}/blue-green-app:${{ github.sha }} .

      - name: Scan Docker image with Trivy
        uses: aquasecurity/trivy-action@0.28.0
        with:
          scan-ref: '${{ secrets.DOCKER_USERNAME }}/blue-green-app:${{ github.sha }}'
          format: 'table'

      - name: Push Docker image
        run: |
          docker push ${{ secrets.DOCKER_USERNAME }}/blue-green-app:${{ github.sha }}

      - name: Image Info
        run: |
          IMAGE=${{ secrets.DOCKER_USERNAME }}/blue-green-app:${{ github.sha }}
          echo "Image: $IMAGE"
          docker images --filter=reference="$IMAGE" --format "table {{.Repository}}\t{{.Tag}}\t{{.ID}}\t{{.Size}}" || true
          docker inspect --format='{{json .RepoDigests}}' "$IMAGE" || true

      - name: Set up kubeconfig
        env:
          KUBE_CONFIG_DATA: ${{ secrets.KUBE_CONFIG_DATA }}
        run: |
          mkdir -p $HOME/.kube
          echo "$KUBE_CONFIG_DATA" | base64 --decode > $HOME/.kube/config
          chmod 600 $HOME/.kube/config

      - name: Deploy Green Version
        run: |
          kubectl set image deployment/green-deployment \
            blue-green-app=${{ secrets.DOCKER_USERNAME }}/blue-green-app:${{ github.sha }} \
            -n prod
          kubectl rollout status deployment/green-deployment -n prod

      - name: Health Check
        run: |
          kubectl wait \
            --for=condition=ready pod \
            -l version=green \
            -n prod \
            --timeout=120s

      - name: Verify rollout
        run: |
          kubectl get deployment green-deployment -n prod
          kubectl get pods -n prod -l version=green

      - name: Rollout History
        run: |
          kubectl rollout history deployment/green-deployment -n prod || true

      - name: Deployment Info
        run: |
          kubectl get deploy -n prod
          kubectl get pods -n prod -o wide
          kubectl get svc -n prod

      - name: Rollback on failure
        if: ${{ failure() }}
        run: |
          echo "Previous step failed — rolling back green-deployment"
          kubectl rollout undo deployment/green-deployment -n prod

      - name: Final deployment status (always)
        if: ${{ always() }}
        run: |
          kubectl get deployment green-deployment -n prod
          kubectl get pods -n prod -l app=blue-green-app -o wide
          kubectl get svc -n prod
